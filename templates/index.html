<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💰 Expense Tracker</title>
  <meta name="description" content="Track, categorize, and visualize your expenses with a beautiful dashboard."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Background Orbs -->
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <span class="logo-text">ExpenseTracker</span>
      </div>
      <button class="btn-primary" id="openAddModal">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="btn-text">Add Expense</span>
      </button>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="main">

    <!-- Summary Cards -->
    <section class="cards-grid" aria-label="Spending Summary">
      <div class="card card-total">
        <div class="card-icon">💸</div>
        <div class="card-info">
          <p class="card-label">Total Spent</p>
          <h2 class="card-value" id="totalSpent">$0.00</h2>
        </div>
      </div>
      <div class="card card-month">
        <div class="card-icon">📅</div>
        <div class="card-info">
          <p class="card-label">This Month</p>
          <h2 class="card-value" id="monthlySpent">$0.00</h2>
        </div>
      </div>
      <div class="card card-category">
        <div class="card-icon">🏆</div>
        <div class="card-info">
          <p class="card-label">Top Category</p>
          <h2 class="card-value card-value--sm" id="topCategory">—</h2>
        </div>
      </div>
      <div class="card card-count">
        <div class="card-icon">🧾</div>
        <div class="card-info">
          <p class="card-label">Transactions</p>
          <h2 class="card-value" id="txCount">0</h2>
        </div>
      </div>
    </section>

    <!-- Chart + Filter Row -->
    <section class="dashboard-row">
      <!-- Doughnut Chart -->
      <div class="glass-panel chart-panel">
        <h3 class="panel-title">Spending by Category</h3>
        <div class="chart-wrap">
          <canvas id="categoryChart"></canvas>
          <div class="chart-center-label" id="chartCenterLabel">
            <span class="center-amount" id="chartTotal">$0</span>
            <span class="center-sub">Total</span>
          </div>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>

      <!-- Filter + Expense Table -->
      <div class="glass-panel table-panel">
        <div class="table-header">
          <h3 class="panel-title">Expenses</h3>
          <div class="filter-group">
            <select id="categoryFilter" class="select-input" aria-label="Filter by category">
              <option value="All">All Categories</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Bills">💡 Bills</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Health">🏥 Health</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Education">📚 Education</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table class="expense-table" id="expenseTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expenseBody">
              <tr class="empty-row" id="emptyRow">
                <td colspan="5">
                  <div class="empty-state">
                    <span>💸</span>
                    <p>No expenses yet. Add your first one!</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card" id="modalCard">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Expense</h2>
        <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
      </div>
      <form id="expenseForm" novalidate>
        <input type="hidden" id="expenseId"/>
        <div class="form-grid">
          <div class="form-group form-group--full">
            <label for="fTitle">Title *</label>
            <input type="text" id="fTitle" class="form-input" placeholder="e.g. Grocery run" required/>
          </div>
          <div class="form-group">
            <label for="fAmount">Amount ($) *</label>
            <input type="number" id="fAmount" class="form-input" placeholder="0.00" step="0.01" min="0.01" required/>
          </div>
          <div class="form-group">
            <label for="fDate">Date *</label>
            <input type="date" id="fDate" class="form-input" required/>
          </div>
          <div class="form-group form-group--full">
            <label for="fCategory">Category *</label>
            <select id="fCategory" class="form-input select-input" required>
              <option value="">Select a category</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Bills">💡 Bills</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Health">🏥 Health</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Education">📚 Education</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="form-group form-group--full">
            <label for="fNotes">Notes</label>
            <textarea id="fNotes" class="form-input" placeholder="Optional details..." rows="3"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-ghost" id="cancelModal">Cancel</button>
          <button type="submit" class="btn-primary" id="submitBtn">Save Expense</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
